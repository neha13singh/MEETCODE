version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meetcode-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=MeetCode
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI:-postgresql://neondb_owner:npg_Tj5OGUhY2LRX@ep-polished-firefly-ajuywlcw-pooler.c-3.us-east-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
      - SECRET_KEY=changethis
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REDIS_HOST=redis
      - BACKEND_CORS_ORIGINS=["http://localhost:3000"]
    depends_on:
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs/backend:/app/logs

  redis:
    image: redis:7-alpine
    container_name: meetcode-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
